<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Look and Listen Safe</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://use.typekit.net/uyx6llh.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c2543; /* רקע סגול אינדיגו עמוק כהה */
            overflow: hidden;
            font-family: "futura-pt", "Futura", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; }
        #webcam { display: none; }

        /* מסך פתיחה מותאם להיפוך הצבעים החדש */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #2c2543;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .splash-sub {
            font-family: "futura-pt", "Futura", sans-serif;
            font-size: 13px; /* שורה ראשונה קטנה ועדינה */
            font-weight: normal;
            color: #f4f3ef; /* טקסט לבן-שמנת רך */
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .splash-main {
            font-family: "futura-pt", "Futura", sans-serif;
            font-size: 16px;
            font-weight: bold;
            color: #f4f3ef;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 35px;
        }
        #start-btn {
            background-color: #f4f3ef; /* כפתור שמנת בולט על רקע כהה */
            color: #2c2543;
            border: none;
            padding: 16px 50px;
            font-family: "futura-pt", "Futura", sans-serif;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            outline: none;
            transition: transform 0.1s ease;
        }
        #start-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-sub">ALLOW CAMERA ACCESS AND PRESS START</div>
    <div class="splash-main">CLOSE YOUR EYES TO UNFREEZE THE MUSIC</div>
    <button id="start-btn" onclick="startExperience()">START</button>
</div>

<video id="webcam" autoplay playsinline></video>

<script>
let song;
let amplitude;
let faceMesh;
let camera;

let strokeW = 8;
let mainLightColor; // לבן-שמנת עבור כל האלמנטים הגרפיים והקווים

// ניהול מצב חוויה
let experienceStarted = false;

// מנוע פילטר קשיח ומאוזן
let eyesClosedRealtime = false; 
let eyesConfirmedClosed = false; 
let lastEyeStateChangeTime = 0;
let eyeVisualProgress = 0; 
let volHistory = new Array(120).fill(0);

// זיכרון זמן לשיר
let lastSavedTime = 0;

// מנוע אישון ממורכז ומאוזן
let pupilOffset = { x: 0, y: 0 };
let targetPupil = { x: 0, y: 0 };

function preload() {
    soundFormats('mp3');
    song = loadSound('song.mp3', 
        () => console.log("Audio Loaded"), 
        () => console.log("Backup audio active")
    );
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    amplitude = new p5.Amplitude(0.85);
    mainLightColor = color(244, 243, 239); // צבע הלבן-שמנת הרך והיוקרתי מהרפרנס
}

function startExperience() {
    userStartAudio(); 
    experienceStarted = true;
    
    let splash = document.getElementById('splash-screen');
    splash.style.opacity = '0';
    splash.style.visibility = 'hidden';
    
    initMediaPipe();
}

function draw() {
    background(44, 37, 67); // רקע סגול אינדיגו עמוק קבוע

    if (!experienceStarted) return;

    updateEyeStatus(); 
    handleMusicLogic();
    drawPlayerScreen();
}

function updateEyeStatus() {
    let now = millis();
    
    if (eyesClosedRealtime !== eyesConfirmedClosed) {
        if (!eyesClosedRealtime) {
            eyesConfirmedClosed = false;
            lastEyeStateChangeTime = now;
        } else if (now - lastEyeStateChangeTime > 250) { 
            eyesConfirmedClosed = true;
        }
    } else {
        lastEyeStateChangeTime = now;
    }
}

function handleMusicLogic() {
    if (!song || !song.isLoaded()) return;

    if (eyesConfirmedClosed) {
        if (!song.isPlaying()) {
            song.jump(lastSavedTime); 
            song.play();
        } else {
            lastSavedTime = song.currentTime();
        }
    } else {
        if (song.isPlaying()) {
            lastSavedTime = song.currentTime(); 
            song.pause();
        }
    }
}

function drawPlayerScreen() {
    let isLandscape = width > height;

    let timelineY = height / 2;
    let centerX = width / 2;
    let centerY = height / 4 + 20; 

    // 1. ציור קו הטיימליין המקורק והנקי בצבע בהיר
    stroke(mainLightColor);
    strokeWeight(strokeW);
    line(0, timelineY, width, timelineY);

    let durationSec = song && song.isLoaded() ? song.duration() : 180;
    let currentSec = (song && song.isPlaying()) ? song.currentTime() : lastSavedTime;
    let progressX = map(currentSec, 0, durationSec, 0, width);
    
    fill(mainLightColor);
    noStroke();
    ellipse(progressX, timelineY, 18, 18);

    drawLinearMonitor(timelineY);

    if (isLandscape) {
        return; 
    }

    // 2. מנוע מושן עדין ואיכותי למצמוץ (ללא ריצודים)
    let targetVisual = eyesConfirmedClosed ? 1 : 0;
    eyeVisualProgress = lerp(eyeVisualProgress, targetVisual, 0.18);

    push();
    translate(centerX, centerY);

    // 3. ציור העין בלבד (העיגול/גוף של המפלצת בוטל לחלוטין) בגודל המקורי (95)
    stroke(mainLightColor);
    strokeWeight(strokeW);
    noFill();

    let currentEyeHeight = map(eyeVisualProgress, 0, 1, 50, 0);

    if (eyeVisualProgress < 0.88) {
        // עין פתוחה - מושן חלק
        arc(0, 0, 95, currentEyeHeight, 0, PI, OPEN);
        arc(0, 0, 95, currentEyeHeight, PI, TWO_PI, OPEN);
        
        pupilOffset.x = lerp(pupilOffset.x, targetPupil.x, 0.15);
        pupilOffset.y = lerp(pupilOffset.y, targetPupil.y, 0.15);
        
        let limitedX = constrain(pupilOffset.x, -10, 10);
        let limitedY = constrain(pupilOffset.y, -6, 6);
        
        fill(mainLightColor);
        noStroke();
        let pupilSize = map(eyeVisualProgress, 0, 1, 25, 0);
        ellipse(limitedX, limitedY, pupilSize, pupilSize);
    } else {
        // עין עצומה - מושן חלק ומלא
        stroke(mainLightColor);
        line(-47, 0, 47, 0);
        line(-25, 0, -25, 8);
        line(0, 0, 0, 10);
        line(25, 0, 25, 8);
    }
    pop();

    // 4. ציור הטיפוגרפיה הבהירה בשורה אחת
    textAlign(CENTER, CENTER);
    noStroke();
    textFont("futura-pt", 15);
    textStyle(BOLD); 

    let textY = height - 90;
    let padding = 30; 
    let textW = width - (padding * 2);

    fill(mainLightColor);
    text("CLOSE YOUR EYES TO EXPERIENCE TIME", width / 2 - textW / 2, textY, textW, 40);
}

function drawLinearMonitor(baselineY) {
    let level = amplitude.getLevel();
    let isMoving = song && song.isPlaying();
    let targetY = isMoving ? map(level, 0, 0.3, 0, 75, true) : 0;
    
    volHistory.push(targetY);
    if (volHistory.length > width / 4) volHistory.shift();

    push();
    translate(0, baselineY);
    stroke(mainLightColor); /* קו מוניטור בהיר ונקי */
    strokeWeight(4);
    noFill();
    
    beginShape();
    for (let i = 0; i < volHistory.length; i++) {
        let x = map(i, 0, volHistory.length - 1, 0, width);
        let y = -volHistory[i];
        vertex(x, y);
    }
    endShape();
    pop();
}

function initMediaPipe() {
    const videoElement = document.getElementById('webcam');

    faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true, 
        minDetectionConfidence: 0.65, 
        minTrackingConfidence: 0.65
    });

    faceMesh.onResults(onFaceResults);

    camera = new Camera(videoElement, {
        onFrame: async () => {
            await faceMesh.send({ image: videoElement });
        },
        width: 640,
        height: 480
    });
    
    camera.start().catch(err => console.log("Camera starting...", err));
}

function onFaceResults(results) {
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        eyesClosedRealtime = false;
        eyesConfirmedClosed = false; 
        targetPupil.x = 0;
        targetPupil.y = 0;
        return;
    }

    const landmarks = results.multiFaceLandmarks[0];

    let leftTop = landmarks[159];
    let leftBottom = landmarks[145];
    let rightTop = landmarks[386];
    let rightBottom = landmarks[374];

    let leftDist = dist(leftTop.x, leftTop.y, leftBottom.x, leftBottom.y);
    let rightDist = dist(rightTop.x, rightTop.y, rightBottom.x, rightBottom.y);

    if (leftDist < 0.0145 && rightDist < 0.0145) {
        eyesClosedRealtime = true;
    } else {
        eyesClosedRealtime = false;
        
        let irisCenter = landmarks[468]; 
        let eyeLeftEdge = landmarks[33]; 
        let eyeRightEdge = landmarks[133]; 
        
        if (irisCenter && eyeLeftEdge && eyeRightEdge) {
            let totalEyeWidth = dist(eyeLeftEdge.x, eyeLeftEdge.y, eyeRightEdge.x, eyeRightEdge.y);
            let irisPosFromLeft = dist(eyeLeftEdge.x, eyeLeftEdge.y, irisCenter.x, irisCenter.y);
            let relativeX = irisPosFromLeft / totalEyeWidth;
            let normalizedX = relativeX - 0.5; 
            
            let eyeTopEdge = landmarks[159];
            let eyeBottomEdge = landmarks[145];
            let totalEyeHeight = dist(eyeTopEdge.x, eyeTopEdge.y, eyeBottomEdge.x, eyeBottomEdge.y);
            let irisPosFromTop = dist(eyeTopEdge.x, eyeTopEdge.y, irisCenter.x, irisCenter.y);
            let relativeY = irisPosFromTop / totalEyeHeight;
            let normalizedY = relativeY - 0.5;

            targetPupil.x = map(normalizedX, -0.12, 0.12, -10, 10, true);
            targetPupil.y = map(normalizedY, -0.15, 0.15, -6, 6, true);
        } else {
            targetPupil.x = 0;
            targetPupil.y = 0;
        }
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
