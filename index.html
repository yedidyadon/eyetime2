<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Look and Listen Safe</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://use.typekit.net/uyx6llh.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            overflow: hidden;
            font-family: "futura-pt", "Futura", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; }
        #webcam { display: none; }
    </style>
</head>
<body>

<video id="webcam" autoplay playsinline></video>

<script>
let song;
let amplitude;
let faceMesh;
let camera;

let strokeW = 8;
let purpleColor;

// מנוע פילטר למניעת לאגים במצמוץ
let eyesClosedRealtime = false; 
let eyesConfirmedClosed = false; 
let lastEyeStateChangeTime = 0;
let eyeVisualProgress = 0;
let volHistory = new Array(120).fill(0);

// זיכרון זמן לשיר
let lastSavedTime = 0;

// מנוע אישון דינמי ומדויק
let pupilOffset = { x: 0, y: 0 };
let targetPupil = { x: 0, y: 0 };

function preload() {
    soundFormats('mp3');
    song = loadSound('song.mp3', 
        () => console.log("Audio Loaded"), 
        () => console.log("Backup audio active")
    );
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    amplitude = new p5.Amplitude(0.85);
    purpleColor = color(102, 51, 153);
    
    initMediaPipe();
}

function draw() {
    background(255); 

    updateEyeStatus(); 
    handleMusicLogic();
    drawPlayerScreen();
}

// פילטר שמפריד בין מצמוץ טבעי מהיר לעצימה מכוונת
function updateEyeStatus() {
    let now = millis();
    if (eyesClosedRealtime !== eyesConfirmedClosed) {
        if (now - lastEyeStateChangeTime > 200) { 
            eyesConfirmedClosed = eyesClosedRealtime;
        }
    } else {
        lastEyeStateChangeTime = now;
    }
}

// ניהול נגינה קשיח
function handleMusicLogic() {
    if (!song || !song.isLoaded()) return;
    userStartAudio(); 

    if (eyesConfirmedClosed) {
        if (!song.isPlaying()) {
            song.jump(lastSavedTime); 
            song.play();
        } else {
            lastSavedTime = song.currentTime();
        }
    } else {
        if (song.isPlaying()) {
            lastSavedTime = song.currentTime(); 
            song.pause();
        }
    }
}

function drawPlayerScreen() {
    let timelineY = height / 2;
    let centerX = width / 2;
    let centerY = height / 4 + 20;

    // קו טיימליין סגול עבה
    stroke(purpleColor);
    strokeWeight(strokeW);
    line(0, timelineY, width, timelineY);

    let durationSec = song && song.isLoaded() ? song.duration() : 180;
    let currentSec = (song && song.isPlaying()) ? song.currentTime() : lastSavedTime;
    
    let progressX = map(currentSec, 0, durationSec, 0, width);
    fill(purpleColor);
    noStroke();
    ellipse(progressX, timelineY, 18, 18);

    drawLinearMonitor(timelineY);

    // אנימציה גרפית חלקה של העין
    let targetVisual = eyesClosedRealtime ? 1 : 0;
    eyeVisualProgress = lerp(eyeVisualProgress, targetVisual, 0.25);

    stroke(purpleColor);
    strokeWeight(strokeW);
    noFill();

    push();
    translate(centerX, centerY);
    let currentEyeHeight = map(eyeVisualProgress, 0, 1, 50, 0);

    if (eyeVisualProgress < 0.9) {
        // עין פתוחה
        arc(0, 0, 95, currentEyeHeight, 0, PI, OPEN);
        arc(0, 0, 95, currentEyeHeight, PI, TWO_PI, OPEN);
        
        pupilOffset.x = lerp(pupilOffset.x, targetPupil.x, 0.2);
        pupilOffset.y = lerp(pupilOffset.y, targetPupil.y, 0.2);
        
        let limitedX = constrain(pupilOffset.x, -14, 14);
        let limitedY = constrain(pupilOffset.y, -6, 6);
        
        fill(purpleColor);
        noStroke();
        let pupilSize = map(eyeVisualProgress, 0, 1, 25, 0);
        ellipse(limitedX, limitedY, pupilSize, pupilSize);
    } else {
        // עין עצומה
        stroke(purpleColor);
        line(-47, 0, 47, 0);
        line(-25, 0, -25, 8);
        line(0, 0, 0, 10);
        line(25, 0, 25, 8);
    }
    pop();

    // טיפוגרפיה
    textAlign(CENTER, CENTER);
    noStroke();
    textFont("futura-pt", 14);
    textStyle(NORMAL);

    let textY = height - 90;
    let padding = 45; 
    let textW = width - (padding * 2);

    if (eyesConfirmedClosed) {
        fill(purpleColor, 130);
        text("KEEP THEM CLOSED. TIME IS FLOWING.", width / 2 - textW / 2, textY, textW, 50);
    } else {
        fill(purpleColor);
        text("LOOKING AT THE SCREEN FREEZES TIME.\nCLOSE YOUR EYES.", width / 2 - textW / 2, textY, textW, 50);
    }
}

function drawLinearMonitor(baselineY) {
    let level = amplitude.getLevel();
    let isMoving = song && song.isPlaying();
    let targetY = isMoving ? map(level, 0, 0.3, 0, 95, true) : 0;
    
    volHistory.push(targetY);
    if (volHistory.length > width / 4) volHistory.shift();

    stroke(purpleColor);
    strokeWeight(4);
    noFill();
    push();
    translate(0, baselineY);
    beginShape();
    for (let i = 0; i < volHistory.length; i++) {
        let x = map(i, 0, volHistory.length - 1, 0, width);
        let y = -volHistory[i];
        vertex(x, y);
    }
    endShape();
    pop();
}

function initMediaPipe() {
    const videoElement = document.getElementById('webcam');

    faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true, 
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });

    faceMesh.onResults(onFaceResults);

    camera = new Camera(videoElement, {
        onFrame: async () => {
            await faceMesh.send({ image: videoElement });
        },
        width: 640,
        height: 480
    });
    
    camera.start().catch(err => console.log("Camera starting...", err));
}

function onFaceResults(results) {
    // *** תיקון ברירת מחדל: אם הפנים זזו מהמסך או לא מזוהות - הכל נפתח ונעצר מיד! ***
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        eyesClosedRealtime = false;
        eyesConfirmedClosed = false; // עוצר את השיר במקום
        targetPupil.x = 0;
        targetPupil.y = 0;
        return;
    }

    const landmarks = results.multiFaceLandmarks[0];

    // חישוב מרחק עפעפיים
    let leftTop = landmarks[159];
    let leftBottom = landmarks[145];
    let rightTop = landmarks[386];
    let rightBottom = landmarks[374];

    let leftDist = dist(leftTop.x, leftTop.y, leftBottom.x, leftBottom.y);
    let rightDist = dist(rightTop.x, rightTop.y, rightBottom.x, rightBottom.y);

    if (leftDist < 0.0165 && rightDist < 0.0165) {
        eyesClosedRealtime = true;
    } else {
        eyesClosedRealtime = false;
        
        // חישוב כיוון מבט
        let irisCenter = landmarks[468]; 
        let eyeLeftEdge = landmarks[33]; 
        let eyeRightEdge = landmarks[133]; 
        
        if (irisCenter && eyeLeftEdge && eyeRightEdge) {
            let totalEyeWidth = dist(eyeLeftEdge.x, eyeLeftEdge.y, eyeRightEdge.x, eyeRightEdge.y);
            let irisPosFromLeft = dist(eyeLeftEdge.x, eyeLeftEdge.y, irisCenter.x, irisCenter.y);
            let relativeX = irisPosFromLeft / totalEyeWidth;
            let normalizedX = relativeX - 0.5; 
            
            let eyeTopEdge = landmarks[159];
            let eyeBottomEdge = landmarks[145];
            let totalEyeHeight = dist(eyeTopEdge.x, eyeTopEdge.y, eyeBottomEdge.x, eyeBottomEdge.y);
            let irisPosFromTop = dist(eyeTopEdge.x, eyeTopEdge.y, irisCenter.x, irisCenter.y);
            let relativeY = irisPosFromTop / totalEyeHeight;
            let normalizedY = relativeY - 0.5;

            targetPupil.x = map(normalizedX, -0.12, 0.12, 18, -18, true);
            targetPupil.y = map(normalizedY, -0.15, 0.15, -6, 6, true);
        } else {
            targetPupil.x = 0;
            targetPupil.y = 0;
        }
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
