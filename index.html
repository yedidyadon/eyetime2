<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Look and Listen Safe</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://use.typekit.net/uyx6llh.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            overflow: hidden;
            font-family: "futura-pt", "Futura", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; }
        #webcam { display: none; }

        /* מסך פתיחה אלגנטי עם היררכיה טיפוגרפית */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .splash-sub {
            font-family: "futura-pt", "Futura", sans-serif;
            font-size: 13px;
            font-weight: normal;
            color: #663399;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .splash-main {
            font-family: "futura-pt", "Futura", sans-serif;
            font-size: 16px;
            font-weight: bold;
            color: #663399;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 35px;
        }
        #start-btn {
            background-color: #663399;
            color: #ffffff;
            border: none;
            padding: 16px 50px;
            font-family: "futura-pt", "Futura", sans-serif;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 51, 153, 0.2);
            outline: none;
            transition: transform 0.1s ease;
        }
        #start-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-sub">ALLOW CAMERA ACCESS AND PRESS START</div>
    <div class="splash-main">CLOSE YOUR EYES TO UNFREEZE THE MUSIC</div>
    <button id="start-btn" onclick="startExperience()">START</button>
</div>

<video id="webcam" autoplay playsinline></video>

<script>
let song;
let amplitude;
let faceMesh;
let camera;

let strokeW = 8;
let purpleColor;

// ניהול מצב חוויה
let experienceStarted = false;

// מנוע פילטר קשיח (דיפולט: עיניים פתוחות)
let eyesClosedRealtime = false; 
let eyesConfirmedClosed = false; 
let lastEyeStateChangeTime = 0;
let volHistory = new Array(120).fill(0);

// זיכרון זמן לשיר
let lastSavedTime = 0;

// מנוע אישון ממורכז ומאוזן
let pupilOffset = { x: 0, y: 0 };
let targetPupil = { x: 0, y: 0 };

function preload() {
    soundFormats('mp3');
    song = loadSound('song.mp3', 
        () => console.log("Audio Loaded"), 
        () => console.log("Backup audio active")
    );
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    amplitude = new p5.Amplitude(0.85);
    purpleColor = color(102, 51, 153);
}

function startExperience() {
    userStartAudio(); 
    experienceStarted = true;
    
    let splash = document.getElementById('splash-screen');
    splash.style.opacity = '0';
    splash.style.visibility = 'hidden';
    
    initMediaPipe();
}

function draw() {
    background(255); 

    if (!experienceStarted) return;

    updateEyeStatus(); 
    handleMusicLogic();
    drawPlayerScreen();
}

// פילטר פוזיטיבי והחלטי - מונע לחלוטין מצבי ביניים וריצודים
function updateEyeStatus() {
    let now = millis();
    
    if (eyesClosedRealtime !== eyesConfirmedClosed) {
        if (!eyesClosedRealtime) {
            // פתיחה או אינטרפטציה שגויה? פתיחה מיידית והחלטית!
            eyesConfirmedClosed = false;
            lastEyeStateChangeTime = now;
        } else if (now - lastEyeStateChangeTime > 250) { 
            // רק עצימה יציבה ומכוונת מאושרת כסגורה
            eyesConfirmedClosed = true;
        }
    } else {
        lastEyeStateChangeTime = now;
    }
}

function handleMusicLogic() {
    if (!song || !song.isLoaded()) return;

    if (eyesConfirmedClosed) {
        if (!song.isPlaying()) {
            song.jump(lastSavedTime); 
            song.play();
        } else {
            lastSavedTime = song.currentTime();
        }
    } else {
        if (song.isPlaying()) {
            lastSavedTime = song.currentTime(); 
            song.pause();
        }
    }
}

function drawPlayerScreen() {
    // בדיקה האם המכשיר נמצא במצב אופקי (Landscape)
    let isLandscape = width > height;

    // הגדרת מיקום הטיימליין (במרכז המסך בשני המצבים)
    let timelineY = height / 2;
    let centerX = width / 2;
    let centerY = height / 4 + 10; 

    // 1. ציור קו הטיימליין המקורי והנקי
    stroke(purpleColor);
    strokeWeight(strokeW);
    line(0, timelineY, width, timelineY);

    let durationSec = song && song.isLoaded() ? song.duration() : 180;
    let currentSec = (song && song.isPlaying()) ? song.currentTime() : lastSavedTime;
    let progressX = map(currentSec, 0, durationSec, 0, width);
    
    fill(purpleColor);
    noStroke();
    ellipse(progressX, timelineY, 18, 18);

    // 2. ציור מוניטור הדציבלים הסגול והנקי מתחת לקו
    drawLinearMonitor(timelineY);

    // *** תנאי: אם המכשיר במצב אופקי (Landscape) - עוצרים כאן ומציגים רק טיימליין! ***
    if (isLandscape) {
        return; 
    }

    // 3. ציור העין הגרפית (מוצג רק במצב אנכי - Portrait)
    // שינוי לערך בינארי החלטי (0 או 70) ללא lerp כדי למנוע ריצודים לחלוטין
    let currentEyeHeight = eyesConfirmedClosed ? 0 : 70;

    stroke(purpleColor);
    strokeWeight(strokeW);
    noFill();

    push();
    translate(centerX, centerY);

    if (currentEyeHeight > 0) {
        // עין פתוחה לרווחה באופן החלטי
        arc(0, 0, 140, currentEyeHeight, 0, PI, OPEN);
        arc(0, 0, 140, currentEyeHeight, PI, TWO_PI, OPEN);
        
        pupilOffset.x = lerp(pupilOffset.x, targetPupil.x, 0.15);
        pupilOffset.y = lerp(pupilOffset.y, targetPupil.y, 0.15);
        
        let limitedX = constrain(pupilOffset.x, -10, 10);
        let limitedY = constrain(pupilOffset.y, -6, 6);
        
        fill(purpleColor);
        noStroke();
        ellipse(limitedX, limitedY, 36, 36);
    } else {
        // עין עצומה לחלוטין באופן החלטי
        stroke(purpleColor);
        line(-70, 0, 70, 0);
        line(-38, 0, -38, 10);
        line(0, 0, 0, 14);
        line(38, 0, 38, 10);
    }
    pop();

    // 4. ציור הטיפוגרפיה (מוצג רק במצב אנכי - Portrait)
    textAlign(CENTER, CENTER);
    noStroke();
    textFont("futura-pt", 15);
    textStyle(BOLD); 

    let textY = height - 90;
    let padding = 30; 
    let textW = width - (padding * 2);

    fill(purpleColor);
    text("CLOSE YOUR EYES TO EXPERIENCE TIME", width / 2 - textW / 2, textY, textW, 40);
}

function drawLinearMonitor(baselineY) {
    let level = amplitude.getLevel();
    let isMoving = song && song.isPlaying();
    let targetY = isMoving ? map(level, 0, 0.3, 0, 75, true) : 0;
    
    volHistory.push(targetY);
    if (volHistory.length > width / 4) volHistory.shift();

    push();
    translate(0, baselineY);
    stroke(purpleColor); 
    strokeWeight(4);
    noFill();
    
    beginShape();
    for (let i = 0; i < volHistory.length; i++) {
        let x = map(i, 0, volHistory.length - 1, 0, width);
        let y = -volHistory[i];
        vertex(x, y);
    }
    endShape();
    pop();
}

function initMediaPipe() {
    const videoElement = document.getElementById('webcam');

    faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true, 
        minDetectionConfidence: 0.65, 
        minTrackingConfidence: 0.65
    });

    faceMesh.onResults(onFaceResults);

    camera = new Camera(videoElement, {
        onFrame: async () => {
            await faceMesh.send({ image: videoElement });
        },
        width: 640,
        height: 480
    });
    
    camera.start().catch(err => console.log("Camera starting...", err));
}

function onFaceResults(results) {
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        eyesClosedRealtime = false;
        eyesConfirmedClosed = false; 
        targetPupil.x = 0;
        targetPupil.y = 0;
        return;
    }

    const landmarks = results.multiFaceLandmarks[0];

    let leftTop = landmarks[159];
    let leftBottom = landmarks[145];
    let rightTop = landmarks[386];
    let rightBottom = landmarks[374];

    let leftDist = dist(leftTop.x, leftTop.y, leftBottom.x, leftBottom.y);
    let rightDist = dist(rightTop.x, rightTop.y, rightBottom.x, rightBottom.y);

    // סף זיהוי פוזיטיבי מהודק
    if (leftDist < 0.0145 && rightDist < 0.0145) {
        eyesClosedRealtime = true;
    } else {
        eyesClosedRealtime = false;
        
        let irisCenter = landmarks[468]; 
        let eyeLeftEdge = landmarks[33]; 
        let eyeRightEdge = landmarks[133]; 
        
        if (irisCenter && eyeLeftEdge && eyeRightEdge) {
            let totalEyeWidth = dist(eyeLeftEdge.x, eyeLeftEdge.y, eyeRightEdge.x, eyeRightEdge.y);
            let irisPosFromLeft = dist(eyeLeftEdge.x, eyeLeftEdge.y, irisCenter.x, irisCenter.y);
            let relativeX = irisPosFromLeft / totalEyeWidth;
            let normalizedX = relativeX - 0.5; 
            
            let eyeTopEdge = landmarks[159];
            let eyeBottomEdge = landmarks[145];
            let totalEyeHeight = dist(eyeTopEdge.x, eyeTopEdge.y, eyeBottomEdge.x, eyeBottomEdge.y);
            let irisPosFromTop = dist(eyeTopEdge.x, eyeTopEdge.y, irisCenter.x, irisCenter.y);
            let relativeY = irisPosFromTop / totalEyeHeight;
            let normalizedY = relativeY - 0.5;

            targetPupil.x = map(normalizedX, -0.12, 0.12, -10, 10, true);
            targetPupil.y = map(normalizedY, -0.15, 0.15, -6, 6, true);
        } else {
            targetPupil.x = 0;
            targetPupil.y = 0;
        }
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
