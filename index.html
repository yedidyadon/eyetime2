<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Look and Listen Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="https://use.typekit.net/uyx6llh.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            overflow: hidden;
            font-family: "futura-pt", "Futura", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        canvas { display: block; }
        #webcam { display: none; }
    </style>
</head>
<body>

<video id="webcam" autoplay playsinline></video>

<script>
let song;
let amplitude;
let faceMesh;
let camera;

// הגדרות עיצוב אחידות (עובי קו 8)
let strokeW = 8;
let purpleColor;

// לוגיקת עיניים ומניעת לאגים במצמוצים (Debounce)
let eyesClosedRealtime = false; 
let eyesConfirmedClosed = false; // המצב הסופי שמשפיע על המוזיקה
let lastEyeStateChangeTime = 0;
let eyeVisualProgress = 0;
let volHistory = new Array(120).fill(0);

// מנוע אישון משופר ומרוסן (Micro-Movement)
let pupilOffset = { x: 0, y: 0 };
let targetPupil = { x: 0, y: 0 };

function preload() {
    soundFormats('mp3');
    song = loadSound('song.mp3', 
        () => console.log("Audio Loaded Successfully"), 
        () => console.log("Backup audio active")
    );
}

function setup() {
    createCanvas(windowWidth, windowHeight);
    amplitude = new p5.Amplitude(0.85);
    purpleColor = color(102, 51, 153); // סגול דיגיטלי נקי
    
    // אתחול אוטומטי ובקשת אישור מצלמה מיד בכניסה לאתר
    initMediaPipe();
}

function draw() {
    background(255); 

    updateEyeStatus(); // מנוע פילטר מצמוצים
    handleMusicLogic();
    drawPlayerScreen();
}

// === מנוע פילטר חכם: מבחין בין מצמוץ מהיר לעצימה ממושכת ===
function updateEyeStatus() {
    let now = millis();
    
    if (eyesClosedRealtime !== eyesConfirmedClosed) {
        // אם המצלמה מזהה שינוי (למשל סגרת עין), נמתין 250 מילישניות כדי לוודא שזה לא סתם מצמוץ
        if (now - lastEyeStateChangeTime > 250) {
            eyesConfirmedClosed = eyesClosedRealtime;
        }
    } else {
        lastEyeStateChangeTime = now;
    }
}

// === הפעלה/עצירה חלקה של השיר ללא קפיצות ולאגים ===
function handleMusicLogic() {
    if (!song || !song.isLoaded()) return;

    userStartAudio(); // הפעלה אוטומטית של סאונד בדפדפן

    if (eyesConfirmedClosed) {
        if (!song.isPlaying()) {
            song.play();
        }
    } else {
        if (song.isPlaying()) {
            song.pause();
        }
    }
}

// === מסך הנגן הראשי ===
function drawPlayerScreen() {
    let timelineY = height / 2;
    let centerX = width / 2;
    let centerY = height / 4 + 20;

    // 1. קו טיימליין סגול (עובי קו 8)
    stroke(purpleColor);
    strokeWeight(strokeW);
    line(0, timelineY, width, timelineY);

    // נקודת התקדמות הזמן
    let durationSec = song && song.isLoaded() ? song.duration() : 180;
    let currentSec = song && song.isPlaying() ? song.currentTime() : 0;
    let progressX = map(currentSec, 0, durationSec, 0, width);
    fill(purpleColor);
    noStroke();
    ellipse(progressX, timelineY, 18, 18);

    // 2. גרף מוניטור דציבלים סגול
    drawLinearMonitor(timelineY);

    // 3. אנימציית העין והאישון הרגיש והמרוסן
    // האנימציה הגרפית מגיבה ישר ל-Realtime כדי שהעין תיסגר מהר, אבל הסאונד מוגן מלאגים
    eyeVisualProgress = lerp(eyeVisualProgress, eyesClosedRealtime ? 1 : 0, 0.25);

    stroke(purpleColor);
    strokeWeight(strokeW);
    noFill();

    push();
    translate(centerX, centerY);
    
    let currentEyeHeight = map(eyeVisualProgress, 0, 1, 50, 0);

    if (eyeVisualProgress < 0.9) {
        // עין פתוחה - עובי 8
        arc(0, 0, 95, currentEyeHeight, 0, PI, OPEN);
        arc(0, 0, 95, currentEyeHeight, PI, TWO_PI, OPEN);
        
        // החלקת תנועת האישון בזמן אמת
        pupilOffset.x = lerp(pupilOffset.x, targetPupil.x, 0.15);
        pupilOffset.y = lerp(pupilOffset.y, targetPupil.y, 0.15);
        
        // הגבלה מקסימלית בתוך מרכז האישון שלא יברח
        let limitedX = constrain(pupilOffset.x, -12, 12);
        let limitedY = constrain(pupilOffset.y, -5, 5);
        
        fill(purpleColor);
        noStroke();
        let pupilSize = map(eyeVisualProgress, 0, 1, 25, 0);
        ellipse(limitedX, limitedY, pupilSize, pupilSize);
    } else {
        // עין עצומה - קו ישר עם ריסים עדינים
        stroke(purpleColor);
        line(-47, 0, 47, 0);
        line(-25, 0, -25, 8);
        line(0, 0, 0, 10);
        line(25, 0, 25, 8);
    }
    pop();

    // 4. טיפוגרפיה איכותית ומרוחקת מהשוליים (Futura Pt)
    textAlign(CENTER, CENTER);
    noStroke();
    
    textFont("futura-pt", 14);
    textStyle(NORMAL);

    let textY = height - 90;
    let padding = 45; // שוליים רחבים ומובטחים מהצדדים
    let textW = width - (padding * 2);

    if (eyesConfirmedClosed) {
        fill(purpleColor, 130);
        text("KEEP THEM CLOSED. TIME IS FLOWING.", width / 2 - textW / 2, textY, textW, 50);
    } else {
        fill(purpleColor);
        // ירידת שורה מובנית למניעת נגיעה בקצוות המסך
        text("LOOKING AT THE SCREEN FREEZES TIME.\nCLOSE YOUR EYES.", width / 2 - textW / 2, textY, textW, 50);
    }
}

function drawLinearMonitor(baselineY) {
    let level = amplitude.getLevel();
    let targetY = song.isPlaying() ? map(level, 0, 0.3, 0, 95, true) : 0;
    
    volHistory.push(targetY);
    if (volHistory.length > width / 4) volHistory.shift();

    stroke(purpleColor);
    strokeWeight(4);
    noFill();
    push();
    translate(0, baselineY);
    beginShape();
    for (let i = 0; i < volHistory.length; i++) {
        let x = map(i, 0, volHistory.length - 1, 0, width);
        let y = -volHistory[i];
        vertex(x, y);
    }
    endShape();
    pop();
}

// === מנוע הבינה המלאכותית (MediaPipe Face Mesh) ===
function initMediaPipe() {
    const videoElement = document.getElementById('webcam');

    faceMesh = new FaceMesh({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
    });

    faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true, 
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });

    faceMesh.onResults(onFaceResults);

    camera = new Camera(videoElement, {
        onFrame: async () => {
            await faceMesh.send({ image: videoElement });
        },
        width: 640,
        height: 480
    });
    
    // הפעלת מצלמה מיידית בטעינת האתר
    camera.start().catch(err => console.log("Waiting for camera permission...", err));
}

function onFaceResults(results) {
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
        eyesClosedRealtime = false;
        targetPupil.x = 0;
        targetPupil.y = 0;
        return;
    }

    const landmarks = results.multiFaceLandmarks[0];

    // 1. קריאת מרחק עפעפיים
    let leftTop = landmarks[159];
    let leftBottom = landmarks[145];
    let rightTop = landmarks[386];
    let rightBottom = landmarks[374];

    let leftDist = dist(leftTop.x, leftTop.y, leftBottom.x, leftBottom.y);
    let rightDist = dist(rightTop.x, rightTop.y, rightBottom.x, rightBottom.y);

    // קביעת מצב העין בזמן אמת
    if (leftDist < 0.0165 && rightDist < 0.0165) {
        eyesClosedRealtime = true;
    } else {
        eyesClosedRealtime = false;
        
        // 2. מנוע מעקב אישון עדין ומרוסן במיוחד (Micro-Movement)
        let irisCenter = landmarks[468]; 
        let eyeCenter = landmarks[473];  
        
        if (irisCenter && eyeCenter) {
            let rawDX = (irisCenter.x - eyeCenter.x);
            let rawDY = (irisCenter.y - eyeCenter.y);
            
            // מיפוי מחדש עדין במיוחד כדי שתנועה קטנה על גבי המסך תזיז את האישון ברכות ולא תנעל אותו
            targetPupil.x = map(rawDX, 0.008, -0.008, -14, 14, true);
            targetPupil.y = map(rawDY, -0.007, 0.007, -6, 6, true);
        } else {
            targetPupil.x = 0;
            targetPupil.y = 0;
        }
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
